<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS1 | Payment Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-focus:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <div class="max-w-md w-full space-y-8 animate-in fade-in duration-700">
        <header class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">AUDD <span class="text-blue-500 text-3xl italic">Direct</span></h1>
            <p class="text-gray-400 text-sm">Professional Solana Payment Links</p>
        </header>

        <main id="setup-section" class="glass p-8 rounded-[2.5rem] space-y-6">
            <section>
                <label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500 mb-3">Merchant Wallet Address</label>
                <input type="text" id="wallet-address" placeholder="Enter Solana Public Key" 
                       class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-sm outline-none input-focus transition-all">
            </section>

            <section>
                <label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-gray-gray-500 mb-3">Amount (AUDD STABLECOIN)</label>
                <input type="number" id="amount" placeholder="0.00" 
                       class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-sm outline-none input-focus transition-all">
            </section>

            <button onclick="generatePaymentFlow()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                Generate Secure Link
            </button>
        </main>

        <footer id="result-section" class="hidden glass p-8 rounded-[2.5rem] text-center scale-up-center">
            <p class="text-green-400 text-[10px] font-bold uppercase tracking-widest mb-4">Link Generated</p>
            <div id="generated-link" class="bg-black/60 p-4 rounded-xl text-[10px] font-mono text-blue-300 break-all border border-white/5 mb-4"></div>
            <button onclick="copyToClipboard()" class="text-[10px] font-bold uppercase text-white border-b border-blue-500 pb-1 hover:text-blue-400 transition-all">
                Copy to Clipboard
            </button>
        </footer>
    </div>

    <script>
        function generatePaymentFlow() {
            const wallet = document.getElementById('wallet-address').value;
            const amount = document.getElementById('amount').value;

            if(!wallet || !amount) {
                alert("Security Note: All fields are required to proceed.");
                return;
            }

            // تم تعديل السطر التالي ليتوافق مع الاسم الجديد checkout.html
            const payURL = `./checkout.html?to=${wallet}&amount=${amount}`;

            // Logic to handle UI transition
            const linkBox = document.getElementById('generated-link');
            linkBox.innerText = window.location.origin + window.location.pathname.replace('index.html', '') + payURL.replace('./', '');
            
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('setup-section').style.opacity = "0.4";

            // Primary Redirection Method
            setTimeout(() => { window.location.href = payURL; }, 500);
        }

        function copyToClipboard() {
            const text = document.getElementById('generated-link').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            });
        }
    </script>
</body>
</html>
