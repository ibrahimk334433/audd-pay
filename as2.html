<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | AUDD Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full glass p-10 rounded-[3rem] text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
        
        <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20 shimmer">
            <span class="text-2xl">⚡</span>
        </div>
        
        <h2 class="text-xl font-bold mb-8 tracking-tight text-gray-300">Checkout Summary</h2>
        
        <div class="space-y-6">
            <div class="text-left bg-black/40 p-5 rounded-2xl border border-white/5">
                <label class="text-[8px] uppercase font-bold text-gray-500 tracking-widest mb-2 block">Recipient Wallet</label>
                <p id="display-wallet" class="text-[10px] font-mono text-blue-400 break-all leading-relaxed"></p>
            </div>

            <div class="py-4">
                <p id="display-amount" class="text-7xl font-black tracking-tighter">0.00</p>
                <p class="text-blue-500 font-extrabold text-xs mt-2 tracking-[0.3em]">AUDD STABLECOIN</p>
            </div>

            <button id="main-pay-button" onclick="executePayment()" class="w-full bg-white text-black font-black py-5 rounded-2xl shadow-2xl hover:bg-gray-200 transition-all active:scale-95 uppercase text-xs tracking-widest">
                Pay with Phantom
            </button>
        </div>
        
        <div class="mt-10 pt-6 border-t border-white/5">
            <p class="text-[8px] text-gray-600 uppercase font-black tracking-[0.3em]">Verified via Solana Network</p>
        </div>
    </div>

    <script>
        // Load data from URL parameters
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const toAddress = params.get('to');
            const payAmount = params.get('amount');

            document.getElementById('display-wallet').innerText = toAddress || "No Address Detected";
            document.getElementById('display-amount').innerText = payAmount || "0.00";
        };

        async function executePayment() {
            // Check for Phantom Provider
            const isPhantomInstalled = window.solana && window.solana.isPhantom;
            
            // Case 1: Site is opened within Phantom Browser or browser has extension
            if (isPhantomInstalled) {
                try {
                    const resp = await window.solana.connect();
                    console.log("Connected to:", resp.publicKey.toString());
                    alert("Success: Connected to wallet " + resp.publicKey.toString().slice(0,6) + "...");
                    
                    // Transaction logic for AUDD would go here
                } catch (err) {
                    console.error("Connection error:", err);
                    alert("Error: Connection refused by user.");
                }
            } 
            // Case 2: Opened in standard mobile browser (Chrome/Safari)
            else {
                const currentUrl = window.location.href;
                // Force open the current page inside Phantom's in-app browser
                const phantomDeepLink = `https://phantom.app/ul/browse/${encodeURIComponent(currentUrl)}`;
                
                alert("Phantom Wallet not detected. Switching to Phantom Mobile App...");
                window.location.href = phantomDeepLink;
            }
        }
    </script>
</body>
</html>
